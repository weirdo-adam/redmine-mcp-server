name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Resolve release metadata
        id: metadata
        run: |
          set -eu

          version=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          if [ -z "$version" ]; then
            echo "Unable to read version from Cargo.toml" >&2
            exit 1
          fi

          archive_name="redmine-mcp-server-$version.tar.gz"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "archive=dist/$archive_name" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/$archive_name.sha256" >> "$GITHUB_OUTPUT"
          echo "source_url=https://github.com/${GITHUB_REPOSITORY}/releases/download/v$version/$archive_name" >> "$GITHUB_OUTPUT"
          echo "homebrew_release_tag=redmine-mcp-server-$version" >> "$GITHUB_OUTPUT"

      - name: Inspect existing release
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          set -eu

          tag_exists=false
          release_exists=false
          release_is_draft=false
          skip=false

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            tag_exists=true
          fi

          if draft=$(gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null); then
            release_exists=true
            if [ "$draft" = "true" ]; then
              release_is_draft=true
            fi
          fi

          if [ "$tag_exists" = "true" ] && [ "$release_exists" = "true" ] && [ "$release_is_draft" != "true" ]; then
            skip=true
            echo "$TAG already has a remote tag and GitHub Release; skipping publish."
          fi

          echo "tag_exists=$tag_exists" >> "$GITHUB_OUTPUT"
          echo "release_exists=$release_exists" >> "$GITHUB_OUTPUT"
          echo "release_is_draft=$release_is_draft" >> "$GITHUB_OUTPUT"
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      - name: Validate Homebrew tap token
        if: steps.existing.outputs.skip != 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -eu

          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN is required to update weirdo-adam/homebrew-tap after a release."
            exit 1
          fi

      - name: Build release package
        if: steps.existing.outputs.skip != 'true'
        run: scripts/package-release.sh

      - name: Resolve source checksum
        id: checksum
        if: steps.existing.outputs.skip != 'true'
        env:
          CHECKSUM: ${{ steps.metadata.outputs.checksum }}
        run: |
          set -eu

          echo "source_sha256=$(awk '{print $1}' "$CHECKSUM")" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        if: steps.existing.outputs.skip != 'true' && steps.existing.outputs.tag_exists != 'true'
        env:
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          set -eu

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.existing.outputs.skip != 'true' && steps.existing.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          ARCHIVE: ${{ steps.metadata.outputs.archive }}
          CHECKSUM: ${{ steps.metadata.outputs.checksum }}
        run: |
          set -eu

          gh release create "$TAG" "$ARCHIVE" "$CHECKSUM" \
            --title "$TAG" \
            --generate-notes \
            --verify-tag

      - name: Update existing GitHub Release assets
        if: steps.existing.outputs.skip != 'true' && steps.existing.outputs.release_exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
          ARCHIVE: ${{ steps.metadata.outputs.archive }}
          CHECKSUM: ${{ steps.metadata.outputs.checksum }}
        run: |
          set -eu

          gh release upload "$TAG" "$ARCHIVE" "$CHECKSUM" --clobber

      - name: Publish draft GitHub Release
        if: steps.existing.outputs.skip != 'true' && steps.existing.outputs.release_exists == 'true' && steps.existing.outputs.release_is_draft == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          set -eu

          gh release edit "$TAG" --draft=false --latest --verify-tag

      - name: Dispatch Homebrew bottle workflow
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPOSITORY: weirdo-adam/homebrew-tap
          FORMULA: redmine-mcp-server
          RELEASE_TAG: ${{ steps.metadata.outputs.homebrew_release_tag }}
          SOURCE_URL: ${{ steps.metadata.outputs.source_url }}
          SOURCE_SHA256: ${{ steps.checksum.outputs.source_sha256 }}
        run: |
          set -eu

          if ! gh workflow run Bottle \
              --repo "$TAP_REPOSITORY" \
              --ref main \
              -f formula="$FORMULA" \
              -f release_tag="$RELEASE_TAG" \
              -f source_url="$SOURCE_URL" \
              -f source_sha256="$SOURCE_SHA256"; then
            echo "::error::Failed to dispatch the Homebrew tap workflow. Ensure HOMEBREW_TAP_TOKEN has Actions read/write access to $TAP_REPOSITORY."
            exit 1
          fi
